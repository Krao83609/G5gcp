name: Test Schedule

on:
  schedule:
    - cron: '*/5 * * * *'

jobs:
  hello_world:
    runs-on: ubuntu-latest

    steps:
      - name: say hello world
        run: echo "the current server time is $(date)"

      - name: skip on monday
        if: ${{ startsWith(env.WEEKDAY, 'Mon') }}
        run: |
          echo "Skipping on Monday"

      - name: every 5 mins
        run: echo "run every 5 mins"

    env:
      WEEKDAY: ${{ github.event_name == 'schedule' && format('{0}', now().format('ddd')) }}
